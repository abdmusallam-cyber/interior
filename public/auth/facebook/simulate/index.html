<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>محاكي ربط Meta - Interior</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;background:#f3f4f6;color:#0f172a;padding:24px} .card{max-width:720px;margin:40px auto;background:white;padding:20px;border-radius:12px;box-shadow:0 6px 20px rgba(2,6,23,0.08)}</style>
</head>
<body>
  <div class="card">
    <h2>محاكي ربط فيسبوك وإنستجرام</h2>
    <p>هذه صفحة محاكاة تفتح بدلاً من صفحة تسجيل الدخول الحقيقية عند عدم تهيئة مفاتيح التطبيق.</p>
    <div id="scopes" style="background:#f8fafc;padding:10px;border-radius:8px;margin:12px 0;font-family:monospace;direction:ltr"></div>
    <div style="display:flex;gap:8px;justify-content:flex-start">
      <button id="approve" style="background:#1877F2;color:white;border:none;padding:10px 14px;border-radius:8px;cursor:pointer">موافق، ربط الهوية الإعلانية</button>
      <button id="cancel" style="background:#e2e8f0;border:none;padding:10px 14px;border-radius:8px;cursor:pointer">إلغاء</button>
    </div>
    <p style="font-size:12px;color:#6b7280;margin-top:12px">ملاحظة: لعمل ربط حقيقي، ضع `FACEBOOK_APP_SECRET` و`FACEBOOK_APP_ID` في إعدادات الخادم ونشر الخادم الحقيقي.</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const scopes = params.get('scopes') || '';
    document.getElementById('scopes').textContent = scopes;

    document.getElementById('approve').addEventListener('click', () => {
      const origin = params.get('origin') || location.origin;
      const redirect = `${origin}/auth/facebook/callback?code=sim_code_123456`;
      location.href = redirect;
    });

    document.getElementById('cancel').addEventListener('click', () => window.close());
  </script>
</body>
</html>
